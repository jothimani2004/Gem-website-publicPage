name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10

        with:
          host: 67.211.219.18
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            bash /var/www/deploy.sh
